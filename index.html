<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="margin: 0; background: #000; overflow: hidden">
    <canvas id="ocean" width="1920" height="1080"></canvas>

    <div
      id="hint"
      style="
        position: absolute;
        top: 10px;
        left: 10px;
        color: #adf;
        font-family: monospace;
        font-size: 13px;
      "
    >
      🖱️ drag to orbit &nbsp;|&nbsp; scroll to zoom &nbsp;|&nbsp; click ocean to splash
    </div>

    <!-- Wave Generator Controls -->
    <div
      id="controls"
      style="
        position: absolute;
        top: 40px;
        left: 10px;
        color: #adf;
        font-family: monospace;
        font-size: 12px;
        background: rgba(0, 0, 0, 0.5);
        padding: 10px;
        border-radius: 8px;
        min-width: 220px;
      "
    >
      <div style="margin-bottom: 6px; font-size: 13px">🌊 Wave Generator</div>
      <hr style="border-color: #336; margin: 4px 0 8px 0" />

      <div style="margin: 4px 0">
        <label>Mode:</label><br />
        <select
          id="waveMode"
          style="
            background: #113;
            color: #adf;
            border: 1px solid #336;
            width: 100%;
            margin-top: 2px;
            padding: 2px;
          "
        >
          <option value="off">Off</option>
          <option value="swell" selected>Swell (edge)</option>
          <option value="rain">Rain (random)</option>
          <option value="pulse">Pulse (center)</option>
        </select>
      </div>

      <div style="margin: 8px 0">
        <label>Amplitude: <span id="ampVal">0.5</span></label
        ><br />
        <input
          id="amp"
          type="range"
          min="0.1"
          max="2.0"
          step="0.1"
          value="0.5"
          style="width: 100%"
        />
      </div>

      <div style="margin: 8px 0">
        <label>Frequency: <span id="freqVal">0.4</span></label
        ><br />
        <input
          id="freq"
          type="range"
          min="0.1"
          max="2.0"
          step="0.1"
          value="0.4"
          style="width: 100%"
        />
      </div>

      <div style="margin: 8px 0">
        <label>Speed: <span id="speedVal">1.0</span></label
        ><br />
        <input
          id="speed"
          type="range"
          min="0.1"
          max="5.0"
          step="0.1"
          value="1.0"
          style="width: 100%"
        />
      </div>
    </div>

    <!-- Vite handles TS compilation — just point to main.ts -->
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
